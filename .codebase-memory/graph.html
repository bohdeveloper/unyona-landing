    needsDraw=true;}
  else{const r=cv.getBoundingClientRect();const h=pick(e.clientX-r.left,e.clientY-r.top);
    if(h!==hover){hover=h;cv.style.cursor=h===null?'grab':'pointer';needsDraw=true;}}};
window.onmouseup=e=>{if(drag&&!drag.moved&&drag.btn===0){const r=cv.getBoundingClientRect();
    sel=pick(e.clientX-r.left,e.clientY-r.top);showPanel(sel);needsDraw=true;}drag=null;};
cv.ondblclick=e=>{const r=cv.getBoundingClientRect();const id=pick(e.clientX-r.left,e.clientY-r.top);
  if(id!==null){iso=new Set([id,...adj.get(id).map(a=>a.n)]);sel=id;center(id);dist=fitDist*0.45;showPanel(id);needsDraw=true;}};
cv.onwheel=e=>{e.preventDefault();dist*=e.deltaY<0?0.88:1.14;dist=Math.max(RAD*0.15,Math.min(RAD*8,dist));needsDraw=true;};
window.onkeydown=e=>{if(e.key==='Escape'){sel=null;iso=null;showPanel(null);fit();}};
const rotbtn=document.getElementById('rotbtn');
rotbtn.onclick=()=>{autoRot=!autoRot;rotbtn.classList.toggle('on',autoRot);};
document.getElementById('fitbtn').onclick=()=>fit();
document.getElementById('search').oninput=e=>{query=e.target.value.trim().toLowerCase();needsDraw=true;};
const fl=document.getElementById('filters');
Object.entries(COLORS).forEach(([t,c])=>{const l=document.createElement('label');
  l.innerHTML='<input type="checkbox" checked> <span class="sw" style="background:'+c+'"></span>'+t;
  l.querySelector('input').onchange=ev=>{ev.target.checked?active.add(t):active.delete(t);needsDraw=true;};fl.appendChild(l);});
new ResizeObserver(()=>{resize();needsDraw=true;}).observe(document.getElementById('wrap'));
(function loop(){requestAnimationFrame(loop);
  if(autoRot){yaw+=0.0022;needsDraw=true;}
  if(needsDraw){needsDraw=false;draw();}})();
fit();
</script></body></html>
