name: Enviar Cápsula Informativa

on:
  # Envío automático cada martes a las 07:00 UTC (09:00 CET / 10:00 CEST)
  # Martes es el día con mayor tasa de apertura; 9h local es la ventana
  # de mayor engagement antes de que arranque la jornada laboral en España.
  schedule:
    - cron: "0 7 * * 2"

  # Envío manual desde GitHub Actions → Run workflow
  workflow_dispatch:
    inputs:
      capsula:
        description: "Archivo de cápsula a enviar (ej: 2026-06-01). Vacío = más reciente."
        required: false
        default: ""

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enviar cápsula
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}
          CAPSULA: ${{ github.event.inputs.capsula }}
        run: node scripts/send-newsletter.mjs
